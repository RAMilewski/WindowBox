[display]

# wlr-randr output name — run 'wlr-randr' to list available outputs
output       = HDMI-A-1

# Display rotation applied at startup via wlr-randr: normal | 90 | 180 | 270
rotation     = 90

# Logical resolution after rotation (width x height)
# For rotation 90 or 270 this is the portrait dimensions; the physical
# pre-rotation mode is computed automatically.
resolution   = 1920x1080

# Aspect ratio correction for monitors that stretch their input signal.
# squish = Pi_output_dimension / panel_native_dimension on the squish axis.
# Use 1.0 for a standard monitor with no correction needed.
# Example: Pi outputs 1920 logically, panel native is 2560  →  1920/2560 = 0.75
squish       = 1.0

# Axis to apply the squish correction on:
#   width   — landscape orientation (normal or 180)
#   height  — portrait orientation (90 or 270 rotation)
squish_axis  = width
